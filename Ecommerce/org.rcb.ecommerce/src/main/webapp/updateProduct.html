<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Update Product</title>
</head>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Body Styling */
body {
    font-family: Arial, sans-serif;
    height: 100vh;
    background: linear-gradient(to right, #4e73df, #1cc88a);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Container Card */
#container {
    background-color: white;
    width: 400px;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
}

/* Heading */
h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #333;
}

/* Label */
label {
    display: block;
    margin-top: 10px;
    font-weight: bold;
    font-size: 14px;
}

/* Input Field */
input {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    border: 1px solid #ccc;
    border-radius: 5px;
    outline: none;
}

/* Focus Effect */
input:focus {
    border-color: #4e73df;
    box-shadow: 0 0 5px rgba(78, 115, 223, 0.5);
}

/* Update Button */
button {
    width: 100%;
    padding: 10px;
    margin-top: 20px;
    border: none;
    border-radius: 5px;
    background-color: #ffc107;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

/* Hover Effect */
button:hover {
    opacity: 0.85;
}

/* Main Menu Link */
a {
    display: block;
    margin-top: 10px;
    text-align: center;
    text-decoration: none;
    color: #4e73df;
    font-weight: bold;
}

a:hover {
    text-decoration: underline;
}
</style>
<body>

<h2>Update Product</h2>

<form action="UpdateProductServlet" method="post">

    <label>Product ID</label>
    <input type="number" name="id" required><br><br>

    <label>New Name</label>
    <input type="text" name="name" required><br><br>

    <label>New Cost</label>
    <input type="number" name="cost" required><br><br>

    <label>New Rating (0-10)</label>
    <input type="number" name="availability" min="0" max="10" required><br><br>

    <label>New Brand</label>
    <input type="text" name="brand" required><br><br>

    <button type="submit">Update</button>
    <a href="mainmenu.html">Return to Main menu</a>

</form>

</body>
</html>
